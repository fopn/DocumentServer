#root — send to Nextcloud
location = / { return 302 $the_scheme://$the_host/index.php; }

#script caching protection
location ~ ^(?<cache>\/web-apps\/apps\/(?!api\/documents\/api\.js$).*)$ {
  return 302 $the_scheme://$the_host$the_prefix/9.2.1-$cache_tag$cache$is_args$args;
}

#disable caching for api.js
location ~ ^(\/[\d]+\.[\d]+\.[\d]+[\.|-][\w]+)?\/(web-apps\/apps\/api\/documents\/api\.js)$ {
  expires off;
  add_header Cache-Control "no-store, no-cache, must-revalidate";
  alias  /var/www/euro-office/documentserver/$2;
}

location ~ ^(\/[\d]+\.[\d]+\.[\d]+[\.|-][\w]+)?\/(document_editor_service_worker.js)$ {
  add_header Cache-Control "public, max-age=31536000, immutable" always;
  alias  /var/www/euro-office/documentserver/sdkjs/common/serviceworker/$2;
}

#suppress logging the unsupported locale error in web-apps
location ~ ^(\/[\d]+\.[\d]+\.[\d]+[\.|-][\w]+)?\/(web-apps)(\/.*\.json)$ {
  add_header Cache-Control "public, max-age=31536000, immutable" always;
  error_log /dev/null crit;
  alias /var/www/euro-office/documentserver/$2$3;
}

#suppress logging the unsupported locale error in plugins
location ~ ^(\/[\d]+\.[\d]+\.[\d]+[\.|-][\w]+)?\/(sdkjs-plugins)(\/.*\.json)$ {
  add_header Cache-Control "public, max-age=31536000, immutable" always;
  error_log /dev/null crit;
  alias /var/www/euro-office/documentserver/$2$3;
}

location ~ ^(\/[\d]+\.[\d]+\.[\d]+[\.|-][\w]+)?\/(web-apps|sdkjs|sdkjs-plugins|fonts|dictionaries)(\/.*)$ {
  add_header Cache-Control "public, max-age=31536000, immutable" always;
  alias /var/www/euro-office/documentserver/$2$3;
}

location ~* ^(\/cache\/files.*)(\/.*) {
  alias /var/lib/euro-office/documentserver/App_Data$1;
  add_header Content-Disposition "attachment; filename*=UTF-8''$arg_filename";

  secure_link $arg_md5,$arg_expires;
  secure_link_md5 "$secure_link_expires$uri$secure_link_secret";

  if ($secure_link = "") { return 403; }
  if ($secure_link = "0") { return 410; }
}

# Allow "/internal" interface only from 127.0.0.1
location ~* ^(\/[\d]+\.[\d]+\.[\d]+[\.|-][\w]+)?\/(internal)(\/.*)$ {
  allow 127.0.0.1;
  deny all;
  proxy_pass http://docservice/$2$3;
}

# Allow "/info" interface only from 127.0.0.1
location ~* ^(\/[\d]+\.[\d]+\.[\d]+[\.|-][\w]+)?\/(info)(\/.*)$ {
  allow 127.0.0.1;
  deny all;
  proxy_pass http://docservice/$2$3;
}

#document formats discovery
location ~ ^(\/[\d]+\.[\d]+\.[\d]+[\.|-][\w]+)?\/(meta\/formats)$ {
  add_header Cache-Control "public, max-age=31536000, immutable" always;
  alias /var/www/euro-office/documentserver/document-formats/onlyoffice-docs-formats.json;
}

# Nextcloud — proxy all Nextcloud paths to the nextcloud container
location ~ ^/(index\.php|login|logout|status\.php|cron\.php|heartbeat|ocm|dav) {
  proxy_pass http://nextcloud;
  proxy_set_header Host $host;
  proxy_set_header X-Real-IP $remote_addr;
  proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
  proxy_set_header X-Forwarded-Proto https;
  proxy_read_timeout 900;
  client_max_body_size 512m;
}

location ~ ^/(apps|core|remote\.php|ocs|settings|themes|l10n|custom_apps|dist) {
  proxy_pass http://nextcloud;
  proxy_set_header Host $host;
  proxy_set_header X-Real-IP $remote_addr;
  proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
  proxy_set_header X-Forwarded-Proto https;
  proxy_read_timeout 900;
  client_max_body_size 512m;
}

# Nextcloud public-share & related paths (share links, file links, avatars).
# Trailing slash on s/f/u/call/avatar is REQUIRED so these don't swallow
# doc-server paths like /sdkjs, /fonts, /spellchecker.
location ~ ^/((s|f|u|call|avatar)/|public\.php|csrftoken) {
  proxy_pass http://nextcloud;
  proxy_set_header Host $host;
  proxy_set_header X-Real-IP $remote_addr;
  proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
  proxy_set_header X-Forwarded-Proto https;
  proxy_read_timeout 900;
  client_max_body_size 512m;
}

location ~* ^(\/[\d]+\.[\d]+\.[\d]+[\.|-][\w]+)?\/(ai-proxy)(\/.*)?$ {
  proxy_pass http://docservice/$2$3;
  proxy_connect_timeout 300s;
  proxy_send_timeout    300s;
  proxy_read_timeout    300s;
  send_timeout          300s;
}

location ~ ^/([\d]+\.[\d]+\.[\d]+[\.|-][\w]+)/(?<path>.*)$ {
  proxy_pass http://docservice/$path$is_args$args;
  proxy_http_version 1.1;
}

# Default — document server
location / {
  proxy_pass http://docservice;
  proxy_http_version 1.1;
  proxy_read_timeout 300s;
  proxy_send_timeout 300s;
  proxy_connect_timeout 300s;
  proxy_buffering on;
  proxy_buffers 64 32k;
  proxy_busy_buffers_size 64k;
  proxy_max_temp_file_size 0;
  proxy_redirect off;
}
